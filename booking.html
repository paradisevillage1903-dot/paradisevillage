<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise Village | Rezervasiya Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .booking-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .booking-card h2 {
            color: #1b4332;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 700;
        }

        .booking-card p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #1b4332;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #52b788;
            box-shadow: 0 0 8px rgba(82, 183, 136, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #52b788;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(82, 183, 136, 0.3);
        }

        .submit-btn:hover {
            background-color: #40916c;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2d6a4f;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="booking-card">
        <h2>Rezervasiya Sorğusu</h2>
        <p>Məlumatları doldurun, menecerimiz sizinlə əlaqə saxlayacaq.</p>
        
        <form id="tgForm">
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> Adınız və Soyadınız</label>
                <input type="text" id="fullname" required placeholder="Məs: Əli Əliyev">
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-phone"></i> Telefon Nömrəniz</label>
                <input type="tel" id="phone" required placeholder="Məs: +994 50 123 45 67">
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-calendar-days"></i> Giriş Tarixi</label>
                <input type="date" id="checkin" required>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-users"></i> Qonaq Sayı</label>
                <select id="guests">
                    <option value="1-4 Nəfərlik">1-4 Nəfərlik</option>
                    <option value="5-8 Nəfərlik">5-8 Nəfərlik</option>
                    <option value="8+ Nəfərlik">8+ Nəfərlik (Böyük Qrup)</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Sorğunu Göndər</button>
        </form>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Ana Səhifəyə Qayıt</a>
    </div>

    <script>
        // TELEGRAM BOT AYARLARI
        const TOKEN = "BOT_TOKEN_BURAYA"; // Bura öz Bot Tokenini yapışdır
        const CHAT_ID = "CHAT_ID_BURAYA"; // Bura öz Chat ID-ni yapışdır
        const URI_API = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

        document.getElementById('tgForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('checkin').value;
            const guests = document.getElementById('guests').value;

            // Botun Telegrama göndərəcəyi mesajın strukturu
            let message = `<b>🏡 YENİ REZERVASIYA SÖRQUSU</b>\n\n`;
            message += `<b>👤 Müştəri:</b> ${name}\n`;
            message += `<b>📞 Telefon:</b> ${phone}\n`;
            message += `<b>📅 Tarix:</b> ${date}\n`;
            message += `<b>👥 Qonaq sayı:</b> ${guests}`;

            fetch(URI_API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: 7766487634,
                    parse_mode: 'html',
                    text: message
                })
            })
            .then(response => {
                if(response.ok) {
                    alert('Sorğunuz uğurla göndərildi! Tezi̇liklə sizinlə əlaqə saxlanılacaq.');
                    document.getElementById('tgForm').reset();
                    window.location.href = 'index.html'; // Ana səhifəyə yönləndirir
                } else {
                    alert('Xəta baş verdi. Zəhmət olmasa yenidən yoxlayın.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Şəbəkə xətası baş verdi.');
            });
        });
    </script>

</body>
</html>
